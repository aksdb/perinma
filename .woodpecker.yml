steps:
  test:
    image: jdxcode/mise:latest
    environment:
      GOOGLE_CLIENT_ID: dummy_client_id
      GOOGLE_CLIENT_SECRET: dummy_client_secret
    commands:
      - mise install
      - mise prepare-secrets
      - dotnet test
    volumes:
      - mise-cache:/root/.cache/mise
      - nuget-cache:/root/.nuget/packages
    when:
      - event: push
        branch: main
      - event: pull_request

  build-all:
    image: jdxcode/mise:latest
    environment:
      APP_VERSION: ${CI_COMMIT_TAG}
      GOOGLE_CLIENT_ID:
        from_secret: GOOGLE_CLIENT_ID
      GOOGLE_CLIENT_SECRET:
        from_secret: GOOGLE_CLIENT_SECRET
    commands:
      - apt-get update && apt-get install -y --no-install-recommends wget file fuse zip
      - mise install
      - mise prepare-secrets
      - mise build-appimage
      - mise build-windows-x64
      - mise build-osx-x64
      - mise build-osx-arm64
    volumes:
      - mise-cache:/root/.cache/mise
      - nuget-cache:/root/.nuget/packages
    when:
      - event: tag
        ref: refs/tags/v*

  release:
    image: plugins/github-release
    settings:
      api_key:
        from_secret: github_token
      files:
        - build/AppImage/perinma-${CI_COMMIT_TAG}-linux-x64.AppImage
        - build/win-x64/perinma-${CI_COMMIT_TAG}-win-x64.zip
        - build/osx-x64/perinma-${CI_COMMIT_TAG}-osx-x64.zip
        - build/osx-arm64/perinma-${CI_COMMIT_TAG}-osx-arm64.zip
      title: Release ${CI_COMMIT_TAG}
    when:
      - event: tag
        ref: refs/tags/v*
